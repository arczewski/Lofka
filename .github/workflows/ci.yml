name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Run unit tests
        run: dotnet test tests/Lofka.Tests.Unit --configuration Release --no-build

      - name: Run integration tests
        run: dotnet test tests/Lofka.Tests.Integration --configuration Release --no-build
